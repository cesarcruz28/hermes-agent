name: Build & Deploy Hermes

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub UI

env:
  AWS_REGION:      ${{ secrets.AWS_REGION }}
  ECR_REGISTRY:    ${{ secrets.ECR_REGISTRY }}
  ECR_REPOSITORY:  ${{ secrets.ECR_REPOSITORY }}

jobs:
  deploy:
    name: Build → ECR → EC2
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. AWS credentials ────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      # ── 3. Login to ECR ───────────────────────────────────────────
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── 4. Build & push Docker image ──────────────────────────────
      - name: Build and push image to ECR
        id: build
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}"

          docker build \
            -t "${IMAGE_URI}:${IMAGE_TAG}" \
            -t "${IMAGE_URI}:latest" \
            .

          docker push "${IMAGE_URI}:${IMAGE_TAG}"
          docker push "${IMAGE_URI}:latest"

          echo "image=${IMAGE_URI}:${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "Built and pushed: ${IMAGE_URI}:${IMAGE_TAG}"

      # ── 5. Deploy to EC2 via SSM (no port 22 needed) ─────────────
      - name: Deploy to EC2 via SSM
        run: |
          INSTANCE_ID="${{ secrets.EC2_INSTANCE_ID }}"
          REGION="${{ secrets.AWS_REGION }}"
          ECR_REGISTRY="${{ secrets.ECR_REGISTRY }}"
          ECR_REPO="${{ secrets.ECR_REPOSITORY }}"
          ECR_IMAGE="${ECR_REGISTRY}/${ECR_REPO}:latest"

          # Write deploy script and base64-encode it to avoid any quoting issues
          SCRIPT=$(cat << HEREDOC
          set -e
          ECR_IMAGE="${ECR_IMAGE}"
          sed -i "s|image: .*hermes-agent.*|image: \${ECR_IMAGE}|g" /home/ubuntu/docker-compose.yml
          aws ecr get-login-password --region ${REGION} | docker login --username AWS --password-stdin ${ECR_REGISTRY}
          docker compose -f /home/ubuntu/docker-compose.yml pull
          docker compose -f /home/ubuntu/docker-compose.yml up -d --force-recreate
          echo "=== Deploy complete ==="
          docker ps --format "table {{.Names}}\t{{.Image}}\t{{.Status}}"
          HEREDOC
          )
          ENCODED=$(echo "$SCRIPT" | base64 -w 0)

          # Send single command: decode and run
          COMMAND_ID=$(aws ssm send-command \
            --instance-id "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Hermes deploy ${{ github.sha }}" \
            --timeout-seconds 300 \
            --parameters "commands=[\"echo ${ENCODED} | base64 -d | bash\"]" \
            --query "Command.CommandId" \
            --output text \
            --region "$REGION")

          echo "SSM Command ID: $COMMAND_ID"

          # Poll for up to 5 minutes
          for i in $(seq 1 30); do
            sleep 10
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --region "$REGION" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "[$i] Status: $STATUS"
            if [[ "$STATUS" == "Success" || "$STATUS" == "Failed" || "$STATUS" == "Cancelled" ]]; then
              break
            fi
          done

          # Print full output
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --region "$REGION" \
            --output text \
            --query "[Status, StandardOutputContent, StandardErrorContent]"

          # Fail the step if deploy failed
          [[ "$STATUS" == "Success" ]] || exit 1
