name: Build & Deploy Hermes

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub UI

env:
  AWS_REGION:      ${{ secrets.AWS_REGION }}
  ECR_REGISTRY:    ${{ secrets.ECR_REGISTRY }}
  ECR_REPOSITORY:  ${{ secrets.ECR_REPOSITORY }}

jobs:
  deploy:
    name: Build → ECR → EC2
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. AWS credentials ────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      # ── 3. Login to ECR ───────────────────────────────────────────
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── 4. Build & push Docker image ──────────────────────────────
      - name: Build and push image to ECR
        id: build
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}"

          docker build \
            -t "${IMAGE_URI}:${IMAGE_TAG}" \
            -t "${IMAGE_URI}:latest" \
            .

          docker push "${IMAGE_URI}:${IMAGE_TAG}"
          docker push "${IMAGE_URI}:latest"

          echo "image=${IMAGE_URI}:${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "Built and pushed: ${IMAGE_URI}:${IMAGE_TAG}"

      # ── 5. Deploy to EC2 ──────────────────────────────────────────
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host:        ${{ secrets.EC2_HOST }}
          username:    ${{ secrets.EC2_USER }}
          key:         ${{ secrets.EC2_SSH_KEY }}
          timeout:     60s
          script: |
            set -e
            ECR_IMAGE="${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:latest"

            # Ensure docker-compose.yml references the ECR image
            sed -i "s|image: .*hermes-agent.*|image: ${ECR_IMAGE}|g" /home/ubuntu/docker-compose.yml

            # Login to ECR (EC2 IAM role provides credentials)
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
              | docker login --username AWS --password-stdin \
                  ${{ secrets.ECR_REGISTRY }}

            # Pull new image and restart
            docker compose -f /home/ubuntu/docker-compose.yml pull
            docker compose -f /home/ubuntu/docker-compose.yml up -d --force-recreate

            echo "✓ Deploy complete — running containers:"
            docker ps --format "table {{.Names}}\t{{.Image}}\t{{.Status}}"
