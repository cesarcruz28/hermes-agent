name: Build & Deploy Hermes

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION:     ${{ secrets.AWS_REGION }}
  ECR_REGISTRY:   ${{ secrets.ECR_REGISTRY }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image to ECR
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}"
          docker build -t "${IMAGE_URI}:${IMAGE_TAG}" -t "${IMAGE_URI}:latest" .
          docker push "${IMAGE_URI}:${IMAGE_TAG}"
          docker push "${IMAGE_URI}:latest"
          echo "Pushed: ${IMAGE_URI}:${IMAGE_TAG}"

      - name: Write deploy script to EC2
        run: |
          INSTANCE="${{ secrets.EC2_INSTANCE_ID }}"
          REGION="${{ secrets.AWS_REGION }}"
          ECR_REGISTRY="${{ secrets.ECR_REGISTRY }}"
          ECR_IMAGE="${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:latest"

          sed -e "s|__ECR_IMAGE__|${ECR_IMAGE}|g" \
              -e "s|__ECR_REGISTRY__|${ECR_REGISTRY}|g" \
              -e "s|__REGION__|${REGION}|g" \
              deploy/ec2-deploy.sh > /tmp/hermes-deploy.sh

          ENCODED=$(base64 -w 0 /tmp/hermes-deploy.sh)
          PARAMS=$(python3 deploy/ssm-params.py "$ENCODED")

          CMD_ID=$(aws ssm send-command \
            --instance-id "$INSTANCE" \
            --document-name "AWS-RunShellScript" \
            --parameters "$PARAMS" \
            --timeout-seconds 30 \
            --region "$REGION" \
            --query "Command.CommandId" --output text)

          echo "Write CMD: $CMD_ID"
          sleep 15
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" --instance-id "$INSTANCE" \
            --region "$REGION" --output text \
            --query "[Status, StandardOutputContent, StandardErrorContent]"

      - name: Start deploy on EC2 (background)
        run: |
          INSTANCE="${{ secrets.EC2_INSTANCE_ID }}"
          REGION="${{ secrets.AWS_REGION }}"

          CMD_ID=$(aws ssm send-command \
            --instance-id "$INSTANCE" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["nohup /home/ubuntu/hermes-deploy.sh > /dev/null 2>&1 & echo started"]}' \
            --timeout-seconds 30 \
            --region "$REGION" \
            --query "Command.CommandId" --output text)

          echo "Deploy CMD: $CMD_ID"
          sleep 15
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" --instance-id "$INSTANCE" \
            --region "$REGION" --output text \
            --query "[Status, StandardOutputContent, StandardErrorContent]"

      - name: Wait for deploy to finish
        run: sleep 240

      - name: Verify deploy result
        run: |
          INSTANCE="${{ secrets.EC2_INSTANCE_ID }}"
          REGION="${{ secrets.AWS_REGION }}"

          CMD_ID=$(aws ssm send-command \
            --instance-id "$INSTANCE" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["tail -30 /home/ubuntu/github-deploy.log && echo --- && docker ps"]}' \
            --timeout-seconds 60 \
            --region "$REGION" \
            --query "Command.CommandId" --output text)

          sleep 20
          OUTPUT=$(aws ssm get-command-invocation \
            --command-id "$CMD_ID" --instance-id "$INSTANCE" \
            --region "$REGION" --output text \
            --query "[Status, StandardOutputContent, StandardErrorContent]")

          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "Deploy complete" || { echo "Deploy did not complete"; exit 1; }
          echo "Deploy verified"
